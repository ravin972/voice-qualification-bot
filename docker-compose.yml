# ---------------------------------------------------------------------------
# `docker compose up` — single-service local run.
# Secrets come from a local `.env` (see .env.example); never baked into the image.
# ---------------------------------------------------------------------------
services:
  voice-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: voice-qualification-bot:latest
    container_name: voice-qualification-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
